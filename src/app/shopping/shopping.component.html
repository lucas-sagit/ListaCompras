<div class="all">
  <div class="container">
    <h2>Lista</h2>

    <form #frm="ngForm" class="add-item-form" (ngSubmit)="adicionarItem()">
      <input type="text" id="item" name="item" [(ngModel)]="item" placeholder="Digite o item" required>
      <button type="submit">Adicionar</button>
      <button type="button" (click)="limparLista()">Limpar lista</button>
      <div class="download">
        <button type="button" (click)="downloadPDF()">Baixar lista</button>
      </div>
    </form>

    <div id="lista">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Itens</th>
            <th>Qtd</th>
            <th>Valor R$:</th>
            <th>Apagar</th>
            <th>Editar</th>
          </tr>
        </thead>
          <tbody>
            @for (atributo of lista; track atributo.id) {
              <tr>
                <td>{{ atributo.id }}</td>
                <td>
                  <span [ngClass]="{ 'removerItem': atributo.comprar}">
                    {{ atributo.nome }}
                  </span>
                </td>
                <td>
                  <input type="number" [(ngModel)]="atributo.quantidade" min="1" required>
                </td>
                <td>
                  <input type="text" [(ngModel)]="atributo.valor" min="0" step="0.01" required>
                </td>
                <td>
                  <i class="fas fa-trash-alt" type="button" (click)="removerItem(atributo)"></i>
                </td>
                <td>
                  <i class="fa-solid fa-pencil" type="button" (click)="editarItem(atributo)"></i>
                </td>
              </tr>
            }
            @empty {
              <tr>
            <td colspan="6">Nenhum item na lista</td>
          </tr>
          }
        </tbody>
      </table>
    </div>

  </div>
